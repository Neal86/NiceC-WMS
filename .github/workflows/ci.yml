name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nicec_wms
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: nicec_wms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate
        env:
          DATABASE_URL: postgresql://nicec_wms:test_password@localhost:5432/nicec_wms_test?schema=public

      - name: Prisma generate
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://nicec_wms:test_password@localhost:5432/nicec_wms_test?schema=public

      - name: Run unit tests
        run: npm run test:unit
        env:
          DATABASE_URL: postgresql://nicec_wms:test_password@localhost:5432/nicec_wms_test?schema=public
          NODE_ENV: test

      - name: Run TypeScript type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build frontend
        run: npm run build
        continue-on-error: true
        env:
          NODE_ENV: production
